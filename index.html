<!DOCTYPE html>
<html lang="es">
<head>

    <title>Reporte de Capacitaciones - Minera Las Cenizas</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .slide { height: 100vh; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 900px; }
        .photo-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; }
        h2 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Diapositiva 1: Primeros Auxilios -->
    <section class="slide">
        <h2>Primeros Auxilios</h2>
        <div class="photo-grid">

            <img src="auxilios2.jpg" alt="Foto 2">
            <img src="auxilios3.jpg" alt="Foto 3">
            <img src="auxilios4.jpg" alt="Foto 4">
            <img src="auxilios5.jpg" alt="Foto 5">
            <img src="auxilios6.jpg" alt="Foto 6">

            <img src="trauma4.jpg" alt="Foto 4">
            <img src="trauma5.jpg" alt="Foto 5">
