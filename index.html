<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Capacitaciones - Minera Las Cenizas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f4f4f4; text-align: center; }
        .slide { min-height: 100vh; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 900px; }
        .photo-card { width: 100%; height: 200px; background: #e0e0e0; border-radius: 8px; border: 2px dashed #bbb; display: flex; align-items: center; justify-content: center; color: #777; font-size: 12px; }
        .photo-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        h2 { color: #333; margin-bottom: 30px; }
    </style>
</head>
<body>

    <!-- Función para manejar fotos inexistentes -->
    <script>
        function checkImage(img) {
            if (img.naturalWidth === 0) {
                img.style.display = 'none';
                img.nextElementSibling.style.display = 'flex';
            }
        }
    </script>

    <!-- Diapositiva 1: Primeros Auxilios -->
    <section class="slide">
        <h2>Primeros Auxilios</h2>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=6; i++) {
                    document.write(`
                        <img src="auxilios${i}.jpg" onload="checkImage(this)" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="photo-card" style="display:none">auxilios${i}.jpg (Pendiente)</div>
                    `);
                }
            </script>
        </div>
    </section>

    <!-- Diapositiva 2: Uso de Extintores -->
    <section class="slide">
        <h2>Uso de Extintores</h2>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=6; i++) {
                    document.write(`
                        <img src="extintor${i}.jpg" onload="checkImage(this)" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="photo-card" style="display:none">extintor${i}.jpg (Pendiente)</div>
                    `);
                }
            </script>
        </div>
    </section>

    <!-- Diapositiva 3: Manejo de Trauma -->
    <section class="slide">
        <h2>Manejo de Trauma</h2>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=6; i++) {
                    document.write(`
                        <img src="trauma${i}.jpg" onload="checkImage(this)" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="photo-card" style="display:none">trauma${i}.jpg (Pendiente)</div>
                    `);
                }
            </script>
        </div>
    </section>

    <!-- Diapositiva 4: Sustancias Peligrosas -->
    <section class="slide">
        <h2>Sustancias Peligrosas</h2>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=6; i++) {
                    document.write(`
                        <img src="sustancias${i}.jpg" onload="checkImage(this)" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="photo-card" style="display:none">sustancias${i}.jpg (Pendiente)</div>
                    `);
                }
            </script>
        </div>
    </section>

</body>
</html>
